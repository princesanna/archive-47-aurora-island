<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АРХИВ №47: ОСТРОВ AURORA</title>
    <meta name="description" content="Интерактивная детективная игра-расследование с нелинейным сюжетом и системой последствий">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Boot Screen -->
    <div class="boot-screen" id="bootScreen">
        <div class="boot-logo" data-text="AURORA_DB">АРХИВ №47</div>
        <div class="boot-text">ДЕШИФРОВКА АРХИВА...</div>
        <div class="boot-progress">
            <div class="boot-progress-fill" id="bootProgress"></div>
        </div>
    </div>

    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <!-- Notification Banner -->
    <div class="notification-banner" id="notificationBanner"></div>

    <div class="system-container" id="systemContainer" style="display:none;">

        <aside class="sidebar panel">
            <div class="sidebar-header">
                <div class="header-glitch" data-text="AURORA_DB">AURORA_DB</div>
                <div class="header-subtitle">TOP SECRET / NOFORN</div>
            </div>

            <!-- Stats -->
            <div class="stats-panel">
                <div class="stat-row">
                    <span class="stat-label">Справедл.</span>
                    <div class="stat-track"><div class="stat-fill justice" id="justiceBar" style="width:30%"></div></div>
                    <span class="stat-value" id="justiceVal">30</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Давление</span>
                    <div class="stat-track"><div class="stat-fill pressure" id="pressureBar" style="width:10%"></div></div>
                    <span class="stat-value" id="pressureVal">10</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Контроль</span>
                    <div class="stat-track"><div class="stat-fill control" id="controlBar" style="width:50%"></div></div>
                    <span class="stat-value" id="controlVal">50</span>
                </div>
            </div>

            <div class="file-tree" id="fileTree"></div>

            <div class="sidebar-footer">
                <div class="sys-info">SYS.V.7.4 // SECURE</div>
                <button class="btn-reset" id="btnReset">[ СБРОС СИСТЕМЫ ]</button>
            </div>
        </aside>

        <main class="content-panel panel">
            <div class="content-header">
                <div class="current-file-name" id="currentFileName">_</div>
                <div class="system-status">
                    <span class="pulse-dot"></span>
                    <span>SECURE CONNECTION</span>
                </div>
            </div>

            <div class="content-area" id="content">
                <div class="loading-container">
                    <div class="loading-text">DECRYPTING...</div>
                </div>
            </div>

            <div class="choices-panel" id="choicesPanel"></div>

            <div class="status-bar">
                <div class="progress-box">
                    <span id="progress-info">DECRYPT: 0%</span>
                    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
                </div>
                <div class="time-display" id="timeDisplay">00:00:00</div>
            </div>
        </main>
    </div>

    <div class="ending-modal" id="endingModal">
        <div class="ending-content panel">
            <div class="ending-icon">/!\</div>
            <h2 class="ending-title" id="endingTitle"></h2>
            <div class="ending-text" id="endingText"></div>
            <div class="ending-stats" id="endingStats"></div>
            <button class="ending-button" id="endingButton">[ ИНИЦИАЛИЗАЦИЯ ПЕРЕЗАГРУЗКИ ]</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
